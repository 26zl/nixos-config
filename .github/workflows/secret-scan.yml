name: Secret Scan (Gitleaks)

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for secrets and credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Filesystem scan (`gitleaks dir`) instead of the git-history action, which
      # fails on the first push because the initial commit has no parent to diff.
      - name: Run Gitleaks
        run: |
          version=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks dir . --no-banner --redact --verbose
